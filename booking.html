<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoTravel Booking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        form {
            max-width: 500px;
            margin: auto;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="images/logo.png" width="100"> GoTravel
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="booking.html">Booking</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="container mt-5 mb-5">
        <h2 class="text-center mb-4">Booking Form</h2>

        <form id="bookingForm" class="p-4 shadow rounded bg-light">

            <input type="text" id="name" class="form-control mb-3" placeholder="Name" required>
            <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>

            <div class="mb-3">
                <label class="fw-bold">Gender</label><br>
                <input type="radio" name="gender" value="Male" required> Male
                <input type="radio" name="gender" value="Female" required> Female
            </div>

            <div class="mb-4">
                <label class="fw-bold d-flex justify-content-between">
                    <span>Number of Travellers</span>
                    <span id="rangeValue" class="badge bg-primary">1 person</span>
                </label>

                <input type="range" min="1" max="10" value="1" id="numTravellers" class="form-range">
            </div>

            <button type="submit" class="btn btn-dark w-100 fw-bold">Submit Booking</button>

        </form>
    </section>

    <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">© 2026 GoTravel | PUTERI & HUSNA</p>
    </footer>

    <script>
        const range = document.getElementById("numTravellers");
        const rangeValue = document.getElementById("rangeValue");

        range.addEventListener("input", function () {
            let text = this.value == 1 ? "person" : "people";
            rangeValue.textContent = this.value + " " + text;
        });

        document.getElementById("bookingForm").addEventListener("submit", function (e) {
            e.preventDefault();

            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let gender = document.querySelector('input[name="gender"]:checked');

            if (name === "" || email === "" || !gender) {
                alert("Please fill all fields!");
            } else {
                alert("Booking Successful!");
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
