<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoTravel Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.custom-btn {
    background-color: black;
    color: white;
    border: none;
}
.custom-btn:hover {
    background-color: #333;
    transform: scale(1.03);
}
</style>
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow w-100" style="max-width:400px;">
        <h3 class="text-center mb-3">GoTravel Login</h3>

        <form id="loginForm">
            <input type="text" id="username" class="form-control mb-2" placeholder="Username" required>
            <input type="password" id="password" class="form-control mb-2" placeholder="Password" required>
            <input type="password" id="confirmPassword" class="form-control mb-3" placeholder="Confirm Password" required>

            <button type="submit" class="btn w-100 fw-bold custom-btn">
                Login
            </button>
        </form>
    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let pass = document.getElementById("password").value;
    let confirm = document.getElementById("confirmPassword").value;

    if(pass !== confirm){
        alert("Passwords do not match!");
    } else {
        alert("Login successful!");
        window.location.href = "home.html";
    }
});
</script>

</body>
</html>
